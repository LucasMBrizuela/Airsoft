    <!-- Redirige tokens de Netlify Identity al panel admin (Decap CMS) -->
    <script>
        (function () {
            var hash = window.location.hash;
            if (!hash) return;
            var esTokenIdentity =
                hash.indexOf('recovery_token=') !== -1 ||
                hash.indexOf('invite_token=') !== -1 ||
                hash.indexOf('confirmation_token=') !== -1;
            if (esTokenIdentity && window.location.pathname.indexOf('/admin') !== 0) {
                window.location.replace('/admin/' + hash);
            }
        })();
    </script>

    <script>
        // Los productos se cargan desde productos.json (editable por el cliente en /admin/).
        var PRODUCTOS = {};

        var WHATSAPP_BASE = 'https://wa.me/5491132027418?text=';
        var carrito = {};
        var detalleActualId = null;
        var modal = document.getElementById('modal-detalle');
        var catalogoEl = document.getElementById('catalogo');
        var catalogoVacio = document.getElementById('catalogo-vacio');
        var buscadorInput = document.getElementById('buscador-input');
        var categoriaActiva = 'marcadoras';
        var MSG_CATEGORIA_VACIA = 'No hay productos en esta categoría por el momento.';
        var MSG_SIN_RESULTADOS = 'No se encontraron productos para tu búsqueda.';

        function esHashProducto() {
            var hash = window.location.hash;
            return hash.indexOf('#producto-') === 0;
        }

        function formatearPrecio(numero) {
            return '$' + numero.toLocaleString('es-AR');
        }

        function obtenerCantidadTotal() {
            var total = 0;
            Object.keys(carrito).forEach(function (id) { total += carrito[id]; });
            return total;
        }

        function agregarAlCarrito(id) {
            if (!PRODUCTOS[id]) return;
            carrito[id] = (carrito[id] || 0) + 1;
            actualizarCarritoUI();
        }

        function cambiarCantidad(id, delta) {
            if (!carrito[id]) return;
            carrito[id] += delta;
            if (carrito[id] <= 0) delete carrito[id];
            actualizarCarritoUI();
        }

        function eliminarDelCarrito(id) {
            delete carrito[id];
            actualizarCarritoUI();
        }

        function calcularTotalCarrito() {
            var total = 0;
            Object.keys(carrito).forEach(function (id) {
                total += PRODUCTOS[id].precioNumerico * carrito[id];
            });
            return total;
        }

        function generarMensajePedido() {
            var lineas = ['Hola, quiero realizar el siguiente pedido:', ''];
            Object.keys(carrito).forEach(function (id) {
                var p = PRODUCTOS[id];
                var cant = carrito[id];
                lineas.push('• ' + p.nombre + ' x' + cant);
                lineas.push('  Precio unitario: ' + p.precio);
                lineas.push('  Subtotal: ' + formatearPrecio(p.precioNumerico * cant));
                lineas.push('');
            });
            lineas.push('TOTAL: ' + formatearPrecio(calcularTotalCarrito()));
            return lineas.join('\n');
        }

        function actualizarCarritoUI() {
            var itemsEl = document.getElementById('carrito-items');
            var badge = document.getElementById('carrito-badge');
            var totalEl = document.getElementById('carrito-total');
            var btnFinalizar = document.getElementById('btn-finalizar-wa');
            var ids = Object.keys(carrito);
            var cantidadTotal = obtenerCantidadTotal();

            badge.textContent = cantidadTotal;
            badge.classList.toggle('visible', cantidadTotal > 0);

            if (ids.length === 0) {
                itemsEl.innerHTML = '<p class="carrito-vacio-msg">Tu carrito está vacío.</p>';
                totalEl.textContent = '$0';
                btnFinalizar.href = '#';
                btnFinalizar.style.pointerEvents = 'none';
                btnFinalizar.style.opacity = '0.5';
                return;
            }

            itemsEl.innerHTML = '';
            ids.forEach(function (id) {
                var p = PRODUCTOS[id];
                var cant = carrito[id];
                var item = document.createElement('div');
                item.className = 'carrito-item';
                item.innerHTML =
                    '<img src="' + p.imagenes[0] + '" alt="">' +
                    '<div class="carrito-item-info">' +
                        '<p class="carrito-item-nombre">' + p.nombre + '</p>' +
                        '<p class="carrito-item-precio">' + p.precio + ' c/u</p>' +
                        '<div class="carrito-item-cantidad">' +
                            '<button type="button" data-accion="menos" data-id="' + id + '" aria-label="Reducir cantidad">−</button>' +
                            '<span>' + cant + '</span>' +
                            '<button type="button" data-accion="mas" data-id="' + id + '" aria-label="Aumentar cantidad">+</button>' +
                        '</div>' +
                    '</div>' +
                    '<button type="button" class="carrito-item-eliminar" data-id="' + id + '">Eliminar</button>';
                itemsEl.appendChild(item);
            });

            totalEl.textContent = formatearPrecio(calcularTotalCarrito());
            btnFinalizar.href = WHATSAPP_BASE + encodeURIComponent(generarMensajePedido());
            btnFinalizar.style.pointerEvents = '';
            btnFinalizar.style.opacity = '';

            itemsEl.querySelectorAll('[data-accion="menos"]').forEach(function (btn) {
                btn.addEventListener('click', function () { cambiarCantidad(btn.dataset.id, -1); });
            });
            itemsEl.querySelectorAll('[data-accion="mas"]').forEach(function (btn) {
                btn.addEventListener('click', function () { cambiarCantidad(btn.dataset.id, 1); });
            });
            itemsEl.querySelectorAll('.carrito-item-eliminar').forEach(function (btn) {
                btn.addEventListener('click', function () { eliminarDelCarrito(btn.dataset.id); });
            });
        }

        function abrirCarrito() {
            document.getElementById('carrito-panel').classList.add('activo');
            document.getElementById('carrito-overlay').classList.add('activo');
            document.body.classList.add('carrito-abierto');
        }

        function cerrarCarrito() {
            document.getElementById('carrito-panel').classList.remove('activo');
            document.getElementById('carrito-overlay').classList.remove('activo');
            document.body.classList.remove('carrito-abierto');
        }

        document.getElementById('carrito-toggle').addEventListener('click', abrirCarrito);
        document.getElementById('carrito-cerrar').addEventListener('click', cerrarCarrito);
        document.getElementById('carrito-overlay').addEventListener('click', cerrarCarrito);

        function renderizarCatalogo() {
            catalogoEl.innerHTML = '';
            Object.keys(PRODUCTOS).forEach(function (id) {
                var p = PRODUCTOS[id];
                var multiples = p.imagenes.length > 1;
                var imgsHtml = p.imagenes.map(function (src, i) {
                    return '<img src="' + src + '" alt="' + p.nombre + ' - vista ' + (i + 1) + '">';
                }).join('');

                var articulo = document.createElement('article');
                articulo.className = 'producto categoria-' + p.categoria;
                articulo.dataset.categoria = p.categoria;
                articulo.dataset.id = id;
                articulo.innerHTML =
                    '<div class="tarjeta">' +
                        '<a href="#producto-' + id + '" class="tarjeta-enlace" data-abrir-detalle="' + id + '">' +
                            '<div class="galeria' + (multiples ? '' : ' sin-multiples') + '" data-galeria>' +
                                '<div class="galeria-viewport"><div class="galeria-track">' + imgsHtml + '</div></div>' +
                                (multiples ?
                                    '<button type="button" class="galeria-btn galeria-btn--prev" aria-label="Imagen anterior">&#8249;</button>' +
                                    '<button type="button" class="galeria-btn galeria-btn--next" aria-label="Imagen siguiente">&#8250;</button>' +
                                    '<div class="galeria-indicadores" role="tablist"></div>' : '') +
                            '</div>' +
                            '<div class="tarjeta-contenido">' +
                                '<h2>' + p.nombre + '</h2>' +
                                '<p class="marca">' + p.marca + '</p>' +
                                '<p class="precio">' + p.precio + '</p>' +
                                '<span class="ver-detalle">Ver detalle &rarr;</span>' +
                            '</div>' +
                        '</a>' +
                        '<div class="tarjeta-acciones">' +
                            '<button type="button" class="btn-agregar" data-agregar="' + id + '">Agregar al carrito</button>' +
                        '</div>' +
                    '</div>';
                catalogoEl.appendChild(articulo);
            });
            initGalerias();
            initEventosCatalogo();
        }

        function initEventosCatalogo() {
            document.querySelectorAll('[data-abrir-detalle]').forEach(function (enlace) {
                enlace.addEventListener('click', function (e) {
                    e.preventDefault();
                    abrirDetalle(enlace.dataset.abrirDetalle);
                });
            });
            document.querySelectorAll('[data-agregar]').forEach(function (btn) {
                btn.addEventListener('click', function (e) {
                    e.stopPropagation();
                    agregarAlCarrito(btn.dataset.agregar);
                    abrirCarrito();
                });
            });
        }

        function filtrarCategoria(categoria) {
            categoriaActiva = categoria;
            var visibles = 0;
            document.querySelectorAll('.nav-categorias button').forEach(function (btn) {
                btn.classList.toggle('activo', btn.dataset.categoria === categoria);
            });
            document.querySelectorAll('.producto').forEach(function (producto) {
                var coincide = producto.dataset.categoria === categoria;
                producto.classList.toggle('oculto', !coincide);
                if (coincide) visibles++;
            });
            catalogoVacio.textContent = MSG_CATEGORIA_VACIA;
            catalogoVacio.classList.toggle('visible', visibles === 0);
        }

        function textoBuscableProducto(p) {
            var partes = [p.nombre, p.marca, p.precio, p.categoria];
            if (Array.isArray(p.fichaTecnica)) {
                p.fichaTecnica.forEach(function (f) {
                    partes.push(f.etiqueta, f.valor);
                });
            }
            return partes.join(' ').toLowerCase();
        }

        function aplicarBusqueda(termino) {
            termino = (termino || '').toLowerCase().trim();
            if (termino === '') {
                filtrarCategoria(categoriaActiva);
                return;
            }
            document.querySelectorAll('.nav-categorias button').forEach(function (btn) {
                btn.classList.remove('activo');
            });
            var visibles = 0;
            document.querySelectorAll('.producto').forEach(function (articulo) {
                var p = PRODUCTOS[articulo.dataset.id];
                var coincide = !!p && textoBuscableProducto(p).indexOf(termino) !== -1;
                articulo.classList.toggle('oculto', !coincide);
                if (coincide) visibles++;
            });
            catalogoVacio.textContent = MSG_SIN_RESULTADOS;
            catalogoVacio.classList.toggle('visible', visibles === 0);
        }

        document.querySelectorAll('.nav-categorias button').forEach(function (btn) {
            btn.addEventListener('click', function () {
                if (buscadorInput) buscadorInput.value = '';
                filtrarCategoria(btn.dataset.categoria);
            });
        });

        if (buscadorInput) {
            buscadorInput.addEventListener('input', function () {
                aplicarBusqueda(buscadorInput.value);
            });
        }

        document.getElementById('logo-inicio').addEventListener('click', function (e) {
            e.preventDefault();
            cerrarDetalle();
            cerrarCarrito();
            if (buscadorInput) buscadorInput.value = '';
            filtrarCategoria('marcadoras');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        function abrirDetalle(id) {
            var producto = PRODUCTOS[id];
            if (!producto) return;
            detalleActualId = id;
            document.getElementById('detalle-nombre').textContent = producto.nombre;
            document.getElementById('detalle-marca').textContent = producto.marca;
            document.getElementById('detalle-precio').textContent = producto.precio;
            document.getElementById('detalle-comprar').href = WHATSAPP_BASE + encodeURIComponent(
                'Hola, quiero consultar por ' + producto.nombre + ' (Precio: ' + producto.precio + ')'
            );
            var galeria = document.getElementById('detalle-galeria');
            galeria.innerHTML = '';
            producto.imagenes.forEach(function (src, i) {
                var img = document.createElement('img');
                img.src = src;
                img.alt = producto.nombre + ' - imagen ' + (i + 1);
                galeria.appendChild(img);
            });
            var ficha = document.getElementById('detalle-ficha');
            ficha.innerHTML = '';
            producto.fichaTecnica.forEach(function (item) {
                var dt = document.createElement('dt');
                dt.textContent = item.etiqueta;
                var dd = document.createElement('dd');
                dd.textContent = item.valor;
                ficha.appendChild(dt);
                ficha.appendChild(dd);
            });
            modal.classList.add('activo');
            modal.removeAttribute('hidden');
            document.body.classList.add('modal-abierto');
            history.pushState({ detalle: id }, '', '#producto-' + id);
        }

        function cerrarDetalle() {
            modal.classList.remove('activo');
            modal.setAttribute('hidden', '');
            document.body.classList.remove('modal-abierto');
            detalleActualId = null;
            if (esHashProducto()) {
                history.pushState(null, '', location.pathname);
            }
        }

        document.getElementById('modal-cerrar').addEventListener('click', cerrarDetalle);
        document.getElementById('detalle-agregar').addEventListener('click', function () {
            if (detalleActualId) {
                agregarAlCarrito(detalleActualId);
                cerrarDetalle();
                abrirCarrito();
            }
        });
        modal.addEventListener('click', function (e) {
            if (e.target === modal) cerrarDetalle();
        });
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') {
                if (document.getElementById('carrito-panel').classList.contains('activo')) cerrarCarrito();
                else if (modal.classList.contains('activo')) cerrarDetalle();
            }
        });

        window.addEventListener('popstate', function () {
            if (!esHashProducto()) {
                cerrarDetalle();
                return;
            }
            var hash = location.hash.replace('#producto-', '');
            if (PRODUCTOS[hash]) abrirDetalle(hash);
            else cerrarDetalle();
        });

        function initGalerias() {
            document.querySelectorAll('[data-galeria]').forEach(function (galeria) {
                var track = galeria.querySelector('.galeria-track');
                if (!track) return;
                var slides = track.querySelectorAll('img');
                if (slides.length <= 1) return;
                var indicadores = galeria.querySelector('.galeria-indicadores');
                var btnPrev = galeria.querySelector('.galeria-btn--prev');
                var btnNext = galeria.querySelector('.galeria-btn--next');
                var indice = 0;
                var total = slides.length;
                slides.forEach(function (_, i) {
                    var punto = document.createElement('button');
                    punto.type = 'button';
                    punto.className = 'galeria-indicador' + (i === 0 ? ' activo' : '');
                    punto.setAttribute('aria-label', 'Ver imagen ' + (i + 1));
                    punto.addEventListener('click', function (e) {
                        e.preventDefault();
                        e.stopPropagation();
                        irA(i);
                    });
                    indicadores.appendChild(punto);
                });
                function irA(nuevoIndice) {
                    indice = (nuevoIndice + total) % total;
                    track.style.transform = 'translateX(-' + (indice * 100) + '%)';
                    indicadores.querySelectorAll('.galeria-indicador').forEach(function (p, i) {
                        p.classList.toggle('activo', i === indice);
                    });
                }
                btnPrev.addEventListener('click', function (e) {
                    e.preventDefault();
                    e.stopPropagation();
                    irA(indice - 1);
                });
                btnNext.addEventListener('click', function (e) {
                    e.preventDefault();
                    e.stopPropagation();
                    irA(indice + 1);
                });
            });
        }

        function iniciarTienda() {
            renderizarCatalogo();
            actualizarCarritoUI();
            filtrarCategoria('marcadoras');

            if (esHashProducto()) {
                var idInicial = location.hash.replace('#producto-', '');
                if (PRODUCTOS[idInicial]) abrirDetalle(idInicial);
            }
        }

        fetch('productos.json?v=' + Date.now())
            .then(function (respuesta) {
                if (!respuesta.ok) throw new Error('No se pudo cargar productos.json');
                return respuesta.json();
            })
            .then(function (data) {
                (data.productos || []).forEach(function (p) {
                    if (p && p.id) PRODUCTOS[p.id] = p;
                });
                iniciarTienda();
            })
            .catch(function (error) {
                console.error('Error cargando productos:', error);
                catalogoVacio.textContent = 'No se pudieron cargar los productos. Recargá la página.';
                catalogoVacio.classList.add('visible');
            });
    </script>

</body>
</html>
